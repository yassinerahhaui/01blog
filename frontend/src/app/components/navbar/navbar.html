<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand fw-bold fs-4" routerLink="/">
      <span class="text-primary">01</span>Blog
    </a>

    <button class="navbar-toggler" type="button" (click)="isMenuCollapsed = !isMenuCollapsed">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div [ngbCollapse]="isMenuCollapsed" class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link px-3" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3" routerLink="/posts" routerLinkActive="active">Posts</a>
        </li>
      </ul>

      <div class="d-flex align-items-center gap-3">
        <form class="d-none d-md-flex mx-2">
          <input class="form-control form-control-sm bg-secondary text-white border-0 px-3"
                 type="search"
                 placeholder="Search posts...">
        </form>

        <div ngbDropdown class="d-inline-block">
          <button type="button" class="btn btn-outline-light btn-sm rounded-circle p-2" id="userDropdown" ngbDropdownToggle>
            <i class="bi bi-person-fill"></i>
          </button>
          <div ngbDropdownMenu aria-labelledby="userDropdown" class="dropdown-menu-end shadow border-0 mt-2">
            <button ngbDropdownItem routerLink="/profile">
              <i class="bi bi-person me-2"></i> My Profile
            </button>
            <button ngbDropdownItem routerLink="/settings">
              <i class="bi bi-gear me-2"></i> Settings
            </button>
            <div class="dropdown-divider"></div>

              <i class="bi bi-box-arrow-right me-2"></i> Logout
