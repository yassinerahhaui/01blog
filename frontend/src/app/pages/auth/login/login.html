<div class="card overflow-hidden position-absolute top-50 start-50 translate-middle shadow-lg border-0" style="width: 90%; max-width: 900px; border-radius: 1rem;">
  <div class="row g-0">

    <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-primary-subtle text-white p-5" data-bs-theme="dark">
      <div class="text-center">
        <h2 class="fw-bold mb-4">Welcome to 01Blog!</h2>
        <p class="lead mb-4">Your favorite platform to share ideas and connect with developers. Log in now to get started.</p>
        </div>
    </div>

    <div class="col-md-6 bg-white p-4 p-md-5">
      <div class="text-center mb-4">
        <h3 class="fs-2 fw-bold text-primary">Login</h3>
        <p class="text-muted">Enter your details to access your account</p>
      </div>

      <form (ngSubmit)="onLogin()">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" name="username" [(ngModel)]="loginData.username" id="usernameInput" placeholder="Enter your username or email..." required>
          <label for="usernameInput" class="text-muted">Email or username</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" name="password" [(ngModel)]="loginData.password" class="form-control" id="passwordInput" placeholder="Password" required>
          <label for="passwordInput" class="text-muted">Password</label>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label text-muted" for="rememberMe">
              Remember me
            </label>
          </div>
          <a href="#" class="text-decoration-none text-primary fw-semibold text-sm">Forgot password?</a>
        </div>

        <button class="btn btn-primary w-100 py-3 fs-5 fw-bold rounded-3 shadow-sm" type="submit">
          Sign In
        </button>

        <div class="text-center mt-4">
          <p class="mb-0 text-muted">Don't have an account? <a routerLink="/register" class="text-primary fw-bold text-decoration-none">Sign up now</a></p>
        </div>
      </form>

    </div>
  </div>
</div>
