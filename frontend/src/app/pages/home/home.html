<div class="container">
  <div class="row my-3">
    <div class="col-md-8 col-xl-9">
      <app-slider></app-slider>
    </div>
    <div class="col-md-4 col-xl-3">
      <app-user-card></app-user-card>
    </div>
  </div>
  <div class="row">
    @if (isLoading()) {
    <div class="d-flex justify-content-center">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
    } @else {
    @for (post of posts(); track post.id) {
    <div class="col-xl-4 col-md-6 mb-4">
      <app-post-card [post]="post"></app-post-card>
    </div>
    }@empty {
    <div class="alert alert-warning text-center py-2" role="alert">
      <h5 class="fw-bold text-secondary mb-2">No posts found! 📭</h5>
      <p class="text-muted mb-0">It's a little quiet here. Be the first developer to share your insights!</p>
    </div>
    }
    }
  </div>
</div>
