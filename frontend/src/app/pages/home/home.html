<div class="container">
  <div class="row my-3">
    <div class="col-md-8 col-xl-9">
      <app-slider></app-slider>
    </div>
    <div class="col-md-4 col-xl-3">
      <app-user-card></app-user-card>
    </div>
  </div>
  <div class="row">
    @for (post of posts(); track post.id) {
    <div class="col-xl-4 col-md-6 mb-4">
      <app-post-card [post]="post" (postDeleted)="onPostDeleted($event)"></app-post-card>
    </div>
    }

    @if (!isLoading() && posts().length === 0) {
    <div class="col-12 alert alert-warning text-center py-4" role="alert">
      <h5 class="fw-bold text-secondary mb-2">No posts found! 📭</h5>
      <p class="text-muted mb-0">Follow more people to see their posts here!</p>
    </div>
    }
  </div>

  @if (isLoading()) {
  <div class="d-flex justify-content-center my-4">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
  }

  @if (!hasMore() && posts().length > 0) {
  <div class="text-center text-muted my-5">
    <p>You've caught up on all posts! 🎉</p>
  </div>
  }
</div>
