services:
  db:
    # The specific image you requested
    image: postgres:16.11-alpine3.23
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      # Persist data so you don't lose it when the container stops
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: