services:
  db:
    image: postgres:16.11-alpine3.23
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      network: host # باش يفك ليك مشكل التحميل في Zone01
    container_name: 01blog-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/myapp
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=secret
    volumes:
      - ./backend:/app # كيربط الكود ديالك مع الـ Container
      - ~/.m2:/root/.m2 # كيشارك الـ Maven Cache باش ما يعاودش يتيليشارجي كلشي
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: 01blog-frontend
    ports:
      - "4200:4200" # أو 4200 حسب الـ framework اللي خدام بيه
    volumes:
      - ./frontend:/app
      - /app/node_modules # باش ما يمسحش الـ modules اللي تدار ليهم install وسط الـ container
    environment:
      - CHOKIDAR_USEPOLLING=true # ضروري باش الـ Hot Reload يخدم وسط Docker
    depends_on:
      - backend

volumes:
  db_data: